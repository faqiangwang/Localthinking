name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows - 已验证成功
          - platform: 'windows-x86_64'
            os: windows-latest
            target: x86_64-pc-windows-msvc

          # Linux - 启用并修复
          - platform: 'linux-x86_64'
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          # macOS - 禁用代码签名进行构建
          - platform: 'macos-x86_64'
            os: macos-latest
            target: x86_64-apple-darwin

          # macOS ARM64 - 禁用代码签名进行构建
          - platform: 'macos-aarch64'
            os: macos-latest
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libayatana-appindicator3-1 \
            libappindicator3-1 \
            libxdo-dev \
            libxrandr-dev

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew update
          brew install openssl@3 readline
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (with macOS signing disabled)
        env:
          # macOS: 禁用代码签名
          TAURI_BUNDLE_SKIP_SIGNING: ${{ matrix.os == 'macos-latest' && 'true' || '' }}
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
            !src-tauri/target/${{ matrix.target }}/release/bundle/**/.*
            !src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dSYM/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: false
          files: |
            artifacts/bundle-macos-aarch64/**/*.dmg
            artifacts/bundle-macos-aarch64/**/*.app.tar.gz
            artifacts/bundle-macos-x86_64/**/*.dmg
            artifacts/bundle-macos-x86_64/**/*.app.tar.gz
            artifacts/bundle-linux-x86_64/**/*.AppImage
            artifacts/bundle-linux-x86_64/**/*.deb
            artifacts/bundle-windows-x86_64/**/*.msi
            artifacts/bundle-windows-x86_64/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
