name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-x86_64'
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: 'linux-x86_64'
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: 'macos-x86_64'
            os: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libappindicator3-1

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=/usr/local/opt/openssl@3" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=/usr/local/opt/openssl@3/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/local/opt/openssl@3/include" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri application (Windows/Linux)
        if: matrix.os != 'macos-latest'
        id: build-windows-linux
        continue-on-error: true
        run: |
          echo "Starting Tauri build for ${{ matrix.target }}..."
          npm run tauri build -- --target ${{ matrix.target }} 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}
        env:
          TAURI_BUNDLE_SKIP_SIGNING: 'true'

      - name: Build Tauri application (macOS)
        if: matrix.os == 'macos-latest'
        id: build-macos
        continue-on-error: true
        run: |
          echo "Starting Tauri build for ${{ matrix.target }}..."
          npm run tauri build -- --target ${{ matrix.target }} 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}
        env:
          TAURI_BUNDLE_SKIP_SIGNING: 'true'
          APPLE_SIGNING_IDENTITY: '-'
          APPLE_TEAM_ID: '-'

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.platform }}
          path: build.log
          if-no-files-found: ignore

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/
            !src-tauri/target/${{ matrix.target }}/release/bundle/**/.*
            !src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dSYM/**

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: false
          files: |
            artifacts/bundle-windows-x86_64/**/*.msi
            artifacts/bundle-windows-x86_64/**/*.exe
            artifacts/bundle-linux-x86_64/**/*.AppImage
            artifacts/bundle-linux-x86_64/**/*.deb
            artifacts/bundle-macos-x86_64/**/*.dmg
            artifacts/bundle-macos-x86_64/**/*.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
